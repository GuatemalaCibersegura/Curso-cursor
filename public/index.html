<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZVIZ EB8 4G - Visualizador Web</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Pantalla de login -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-header">
                <i class="fas fa-video camera-icon"></i>
                <h1>EZVIZ EB8 4G</h1>
                <p>Visualizador Web en Vivo</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Usuario" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Iniciar Sesión
                </button>
            </form>
            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <!-- Pantalla principal -->
    <div id="mainScreen" class="main-screen" style="display: none;">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <i class="fas fa-video"></i>
                <h1>EZVIZ EB8 4G</h1>
            </div>
            <div class="header-right">
                <div class="connection-status" id="connectionStatus">
                    <i class="fas fa-circle"></i>
                    <span>Desconectado</span>
                </div>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    Salir
                </button>
            </div>
        </header>

        <!-- Contenido principal -->
        <main class="main-content">
            <!-- Panel de control -->
            <div class="control-panel">
                <div class="control-group">
                    <button id="startStreamBtn" class="control-btn start-btn">
                        <i class="fas fa-play"></i>
                        Iniciar Stream
                    </button>
                    <button id="stopStreamBtn" class="control-btn stop-btn" disabled>
                        <i class="fas fa-stop"></i>
                        Detener Stream
                    </button>
                </div>
                <div class="control-group">
                    <button id="fullscreenBtn" class="control-btn">
                        <i class="fas fa-expand"></i>
                        Pantalla Completa
                    </button>
                    <button id="refreshBtn" class="control-btn">
                        <i class="fas fa-refresh"></i>
                        Actualizar
                    </button>
                </div>
            </div>

            <!-- Área del video -->
            <div class="video-container" id="videoContainer">
                <div class="video-placeholder" id="videoPlaceholder">
                    <i class="fas fa-video-slash"></i>
                    <h3>Sin señal de video</h3>
                    <p>Haz clic en "Iniciar Stream" para comenzar la transmisión</p>
                </div>
                <video id="videoPlayer" class="video-player" controls style="display: none;">
                    Tu navegador no soporta el elemento video.
                </video>
                <div class="video-overlay">
                    <div class="video-info">
                        <span id="videoResolution">--</span>
                        <span id="videoBitrate">--</span>
                    </div>
                </div>
            </div>

            <!-- Panel de información -->
            <div class="info-panel">
                <div class="info-card">
                    <h3><i class="fas fa-info-circle"></i> Estado de la Cámara</h3>
                    <div class="info-item">
                        <span class="label">IP:</span>
                        <span id="cameraIP">--</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Puerto:</span>
                        <span id="cameraPort">--</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Estado:</span>
                        <span id="streamStatus" class="status-disconnected">Desconectado</span>
                    </div>
                </div>

                <div class="info-card">
                    <h3><i class="fas fa-chart-line"></i> Estadísticas</h3>
                    <div class="info-item">
                        <span class="label">Tiempo activo:</span>
                        <span id="uptime">00:00:00</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Calidad:</span>
                        <span id="streamQuality">720p</span>
                    </div>
                    <div class="info-item">
                        <span class="label">FPS:</span>
                        <span id="streamFPS">--</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Notificaciones -->
        <div id="notifications" class="notifications"></div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="app.js"></script>
</body>
</html>
